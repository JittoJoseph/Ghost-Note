services:
  api:
    build: ./api
    ports:
      - "8787:8787"
    volumes:
      - ./api:/app
      - /app/node_modules
      - /app/.wrangler

  telegram-bot:
    build: ./telegram-bot
    ports:
      - "8788:8788"
    volumes:
      - ./telegram-bot:/app
      - /app/node_modules
      - /app/.wrangler

  ghostnote-web:
    build: ./ghostnote-web
    ports:
      - "3000:3000"
    volumes:
      - ./ghostnote-web:/app
      - /app/node_modules
      - /app/.next
